name: Publish AMIs (Release)

# Builds and publishes fck-nat AMIs when a GitHub release is published.
# The release tag (e.g. v1.4.0) drives the package VERSION used by the
# Makefile. The publish-date suffix is appended automatically in the
# Packer template.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.4.0)'
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: ami-release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          # Strip leading "v" if present — Makefile VERSION is unprefixed.
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PUBLISH_ROLE_ARN }}
          aws-region: us-west-2

      - name: Install Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: latest

      - name: Install fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rpm
          sudo gem install --no-document fpm

      - name: Initialize Packer plugins
        run: packer init packer/fck-nat.pkr.hcl

      - name: Publish all AMIs
        run: make publish VERSION=${{ steps.tag.outputs.version }}
