name: Publish AMIs (Reusable)

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to build. Defaults to the latest GitHub release tag.
        required: false
        type: string
        default: ''
      version:
        description: Package version. Defaults to the ref with a leading v stripped.
        required: false
        type: string
        default: ''
    secrets:
      AWS_PUBLISH_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve build ref and version
        id: build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.ref }}" ]; then
            REF="${{ inputs.ref }}"
          else
            REF="$(gh release view --json tagName --jq .tagName)"
          fi

          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${REF#v}"
          fi

          echo "ref=${REF}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Resolved ref: ${REF}"
          echo "Resolved version: ${VERSION}"

      - name: Checkout build ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.build.outputs.ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Repository secret value: arn:aws:iam::568608671756:role/GithubActions-fck-nat
          role-to-assume: ${{ secrets.AWS_PUBLISH_ROLE_ARN }}
          aws-region: us-west-2

      - name: Install Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: latest

      - name: Install fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rpm
          sudo gem install --no-document fpm

      - name: Initialize Packer plugins
        run: packer init packer/fck-nat.pkr.hcl

      - name: Publish all AMIs
        run: make publish VERSION=${{ steps.build.outputs.version }}
